name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit

      - name: Build core (required before typechecking react)
        run: npm run build --workspace packages/core

      - name: Typecheck all packages
        run: npm run typecheck --workspaces --if-present

      - name: Lint all packages
        run: npm run lint --workspaces --if-present

      - name: Core unit tests
        run: npm run test:unit --workspace packages/core

      - name: Core integration tests
        run: npm run test:integration --workspace packages/core

      - name: React package tests
        run: npm run test --workspace packages/react

      - name: Build react package
        run: npm run build --workspace packages/react

      - name: Verify core package
        run: npm pack --dry-run --workspace packages/core

      - name: Verify react package
        run: npm pack --dry-run --workspace packages/react
